<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication - Secure Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-md mx-auto px-4 py-16">
        <h1 class="text-3xl font-bold mb-6">Two-Factor Authentication</h1>

        <p class="mb-6 text-gray-600">
            Enter the 6-digit code sent to your email to complete login.
        </p>

        {% if error %}
            <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                {{ error }}
            </div>
        {% endif %}

        <form method="post" action="{% url '2fa' %}" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="code" class="block text-sm font-medium mb-1">Authentication Code</label>
                <input
                    type="text"
                    name="code"
                    id="code"
                    pattern="[0-9]{6}"
                    maxlength="6"
                    placeholder="123456"
                    required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-lg tracking-widest"
                >
            </div>

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-lg hover:bg-blue-700 transition-colors"
            >
                Verify
            </button>
        </form>

        <p class="mt-4 text-sm text-gray-500">
            <a href="/login/" class="text-blue-600 hover:underline">← Back to login</a>
        </p>
    </div>
</body>
</html>
