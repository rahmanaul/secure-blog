<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-2xl mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold mb-8">Secure Blog</h1>
        {% for post in posts %}
            <article class="mb-6 p-6 bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow">
                <a href="/posts/{{ post.id }}/">
                    <h2 class="text-2xl font-semibold text-gray-800 hover:text-blue-600">{{ post.title }}</h2>
                </a>
                <time class="text-sm text-gray-500">{{ post.published_at|date:"Y-m-d" }}</time>
            </article>
        {% endfor %}
    </div>
</body>
</html>
