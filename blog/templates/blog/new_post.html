<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Post - Secure Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">New Post</h1>
            <a href="/admin/" class="text-gray-600 hover:underline">← Back to admin</a>
        </div>

        <form method="post" action="{% url 'new_post' %}" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="title" class="block text-sm font-medium mb-1">Title</label>
                <input
                    type="text"
                    name="title"
                    id="title"
                    required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                >
            </div>

            <div>
                <label for="content" class="block text-sm font-medium mb-1">Content (Markdown)</label>
                <textarea
                    name="content"
                    id="content"
                    rows="15"
                    required
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 font-mono text-sm"
                ></textarea>
                <p class="mt-1 text-sm text-gray-500">Supports Markdown syntax</p>
            </div>

            <div class="flex gap-4">
                <button
                    type="submit"
                    name="save_as_draft"
                    value="Save as Draft"
                    class="bg-gray-600 text-white py-2 px-6 rounded-lg hover:bg-gray-700 transition-colors"
                >
                    Save as Draft
                </button>
                <button
                    type="submit"
                    name="publish"
                    value="Publish"
                    class="bg-blue-600 text-white py-2 px-6 rounded-lg hover:bg-blue-700 transition-colors"
                >
                    Publish
                </button>
            </div>
        </form>
    </div>
</body>
</html>
